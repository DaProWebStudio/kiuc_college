{% load i18n %}

<aside class="sticky top-28 space-y-6">
    <div class="rounded-3xl border border-slate-100 bg-white p-6 shadow-sm">
        <h4 class="font-display text-base font-bold text-slate-900">{% trans 'Поиск новостей' %}</h4>
        <form method="get" class="mt-4 flex items-center gap-2">
            <label class="sr-only" for="news-search">{% trans 'Поиск по ключевому слову' %}</label>
            <input id="news-search"
                   name="q"
                   type="text"
                   value="{{ request.GET.q }}"
                   placeholder="{% trans 'Ключевое слово…' %}"
                   class="min-w-0 flex-1 rounded-full border border-slate-200 bg-slate-50 px-4 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-brand-500">
            <button type="submit"
                    aria-label="{% trans 'Поиск' %}"
                    class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-brand-900 text-white transition hover:bg-brand-800">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
        </form>
    </div>
</aside>
